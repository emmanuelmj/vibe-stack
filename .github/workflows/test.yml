name: Backend Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: vibe_user
          POSTGRES_PASSWORD: vibe_password
          POSTGRES_DB: vibe_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        cache: 'pip'
        
    - name: Install dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run Alembic Migrations
      working-directory: ./backend
      env:
        DATABASE_URL: postgresql://vibe_user:vibe_password@localhost:5432/vibe_db
        SECRET_KEY: ci_secret_key_12345
      run: |
        alembic upgrade head
        
    - name: Run Tests
      working-directory: ./backend
      env:
        DATABASE_URL: postgresql://vibe_user:vibe_password@localhost:5432/vibe_db
        SECRET_KEY: ci_secret_key_12345
      run: |
        pytest
